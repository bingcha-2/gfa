name: Build & Release GFA Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M1/M2/M3)
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            arch: aarch64
            rust_target: ''
          # macOS Intel
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            arch: x64
            rust_target: x86_64-apple-darwin
          # Windows x64
          - platform: windows-latest
            args: ''
            arch: x64
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────── Rust 工具链 ────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/gfa-client/src-tauri -> target

      # ──────────────── Node.js + 前端依赖 ────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/gfa-client/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/gfa-client
        run: npm ci

      # ──────────────── 构建 Tauri 应用 ────────────────
      - name: Build Tauri app
        working-directory: apps/gfa-client
        run: npx tauri build ${{ matrix.args }}

      # ──────────────── macOS: Ad-hoc 签名 ────────────────
      # 防止 Gatekeeper 弹出 "已损坏，无法打开" 的错误
      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find apps/gfa-client/src-tauri/target -name "*.app" -path "*/bundle/macos/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found!"
            exit 1
          fi
          echo "Signing: $APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep "$APP_PATH" && echo "✅ Signature verified OK"

      # ──────────────── macOS: 用签名后的 .app 重新打包 DMG ────────────────
      - name: Repackage DMG with signed app (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find apps/gfa-client/src-tauri/target -name "*.app" -path "*/bundle/macos/*" | head -1)
          APP_NAME=$(basename "$APP_PATH" .app)
          VERSION=$(node -p "require('./apps/gfa-client/src-tauri/tauri.conf.json').version")
          ARCH="${{ matrix.arch }}"

          # 删除原始未签名的 DMG
          find apps/gfa-client/src-tauri/target -name "*.dmg" -path "*/bundle/dmg/*" -delete
          echo "Removed original unsigned DMG"

          # 创建带 Applications 快捷方式的拖拽安装 DMG
          DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          sync
          sleep 2

          DMG_OUTPUT="apps/gfa-client/src-tauri/target/release-dmg"
          mkdir -p "$DMG_OUTPUT"
          DMG_FILE="${DMG_OUTPUT}/GFA.Client_${VERSION}_${ARCH}.dmg"

          for i in 1 2 3; do
            hdiutil create \
              -volname "${APP_NAME}" \
              -srcfolder "$DMG_DIR" \
              -ov -format UDZO \
              "$DMG_FILE" && break
            echo "hdiutil attempt $i failed, retrying in 5s..."
            sleep 5
          done
          rm -rf "$DMG_DIR"

          echo "✅ Created DMG:"
          ls -lh "$DMG_FILE"

      # ──────────────── 上传构建产物 ────────────────
      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: apps/gfa-client/src-tauri/target/release-dmg/*.dmg

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            apps/gfa-client/src-tauri/target/release/bundle/msi/*.msi
            apps/gfa-client/src-tauri/target/release/bundle/nsis/*.exe

  # ──────────────── 统一发布 Release ────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: |
          echo "Release assets:"
          find release-assets -type f -ls

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/gfa-client/src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME:-v${VERSION}}"

          # 收集所有发布文件
          FILES=$(find release-assets -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \))

          if [ -z "$FILES" ]; then
            echo "::error::No release assets found!"
            exit 1
          fi

          echo "Uploading files:"
          echo "$FILES"

          # 创建或更新 Release
          gh release create "$TAG" \
            $FILES \
            --title "GFA Client v${VERSION}" \
            --notes "## 📦 下载安装

          | 平台 | 架构 | 文件 |
          |------|------|------|
          | macOS | Apple Silicon (M1/M2/M3) | \`GFA.Client_${VERSION}_aarch64.dmg\` |
          | macOS | Intel | \`GFA.Client_${VERSION}_x64.dmg\` |
          | Windows | x64 | \`.msi\` 或 \`.exe\` |

          ### macOS 首次打开
          如果系统提示「无法验证开发者」，请 **右键点击** 应用 → **打开** → 确认打开。

          ### Windows
          如果看到 SmartScreen 警告，点击「更多信息」→「仍要运行」。" \
            --latest
