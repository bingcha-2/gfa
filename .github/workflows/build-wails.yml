name: Build & Release BingchaAI (Wails)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 9.5.1)'
        required: true
        default: '9.5.1'
      changelog:
        description: '更新日志 (用字面 \n 分行,客户端按行渲染为列表)'
        required: false
        default: '-解决了用户提出的问题。\n-解决了提出问题的用户。\n-更新了最新的版本号'
      api_base:
        description: '机器 API 基础域（留空则用默认 https://api.bcai.lol）'
        required: false
        default: 'https://api.bcai.lol'
      apex_base:
        description: '官网 Apex 域，用于更新清单/FAQ（留空则用默认 https://bcai.space）'
        required: false
        default: 'https://bcai.lol'
      portal_base:
        description: '用户中心域，用于注册/反馈/设备等页面（留空则用默认 https://my.bcai.lol）'
        required: false
        default: 'https://my.bcai.lol'

permissions:
  contents: write

env:
  APP_NAME: BingchaAI
  WAILS_DIR: apps/app
  UPDATES_DIR: apps/web/public/updates

jobs:
  # ──────────────── 阶段 1: 多平台构建 ────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: windows-latest
            os_name: windows
            arch: amd64
            goos: windows
            goarch: amd64
            suffix: .exe
          # macOS Apple Silicon (M1/M2/M3/M4)
          - platform: macos-latest
            os_name: macos
            arch: arm64
            goos: darwin
            goarch: arm64
            suffix: ''
          # macOS Intel (x64) — macos-13 retired Dec 2025, use macos-15-intel
          - platform: macos-15-intel
            os_name: macos
            arch: amd64
            goos: darwin
            goarch: amd64
            suffix: ''
          # Linux x64 (ubuntu-22.04 因为 Wails v2 依赖 webkit2gtk-4.0，24.04 已移除)
          - platform: ubuntu-22.04
            os_name: linux
            arch: amd64
            goos: linux
            goarch: amd64
            suffix: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ env.WAILS_DIR }}/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # NSIS：把 Windows 客户端打成安装包（而非裸 exe），显著降低 Defender/SmartScreen 误报。
      # GitHub windows runner 不预装 NSIS，需通过 choco 安装并加入 PATH 供 wails 调用 makensis。
      - name: Install NSIS (Windows)
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # 把本次发布版本号注入 exe / 安装包的版本信息资源
      # （ProductVersion / FileVersion / CompanyName / Copyright 等，空元信息本身就是 ML 怀疑点）
      - name: Inject Windows version metadata (Windows)
        if: matrix.os_name == 'windows'
        working-directory: ${{ env.WAILS_DIR }}
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > "$tmp" && mv "$tmp" wails.json
          echo "Patched wails.json info.productVersion=$VERSION"
          cat wails.json

      # wails build = 前端 npm build → go build (embed frontend/dist)
      # 分两步：先让 wails 构建前端，删掉 source map，再做 Go 编译
      - name: Build Wails app (garble + stripped)
        working-directory: ${{ env.WAILS_DIR }}
        shell: bash
        env:
          GOFLAGS: -trimpath
        run: |
          VERSION="${{ github.event.inputs.version }}"
          API_BASE="${{ github.event.inputs.api_base || 'https://api.bcai.lol' }}"
          APEX_BASE="${{ github.event.inputs.apex_base || 'https://bcai.lol' }}"
          LDFLAGS="-s -w -X main.AppVersion=${VERSION} -X main.buildAPIBase=${API_BASE} -X main.buildApexBase=${APEX_BASE}"

          # 1) 先构建前端，然后删 source map（在 go:embed 打包前）
          PORTAL_BASE="${{ github.event.inputs.portal_base || 'https://my.bcai.lol' }}"
          APEX_BASE="${{ github.event.inputs.apex_base || 'https://bcai.lol' }}"
          cd frontend && npm install && VITE_PORTAL_BASE="${PORTAL_BASE}" VITE_APEX_BASE="${APEX_BASE}" npm run build && cd ..
          find frontend/dist -name '*.map' -delete
          echo "✅ Source maps stripped before Go embed"

          # 2) -s 跳过前端重复构建
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            wails build -nsis -s -ldflags "$LDFLAGS"
          else
            wails build -s -ldflags "$LDFLAGS"
          fi

      # ── Windows: 重命名 + 计算 hash（裸 exe 供自动更新，NSIS 安装包供首次下载）──
      - name: Prepare Windows artifact
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $binDir  = "${{ env.WAILS_DIR }}/build/bin"

          # 1) 裸 exe —— 供 updater.go 热替换自动更新（保持原下载链不变）
          $srcExe = "$binDir/${{ env.APP_NAME }}.exe"
          $dstExe = "$binDir/${{ env.APP_NAME }}-$version.exe"
          Copy-Item $srcExe $dstExe
          $exeHash = (Get-FileHash $dstExe -Algorithm SHA256).Hash
          $exeSize = (Get-Item $dstExe).Length

          # 2) NSIS 安装包 —— 供官网/Release 首次下载（文件名可能含中文，按 *-installer.exe 匹配后重命名为 ASCII）
          $srcInst = Get-ChildItem -Path $binDir -Filter '*-installer.exe' | Select-Object -First 1
          if (-not $srcInst) {
            Write-Error "NSIS installer (*-installer.exe) not found in $binDir"
            Get-ChildItem $binDir | Format-Table Name,Length
            exit 1
          }
          $dstInst = "$binDir/${{ env.APP_NAME }}-$version-setup.exe"
          Copy-Item $srcInst.FullName $dstInst
          $instHash = (Get-FileHash $dstInst -Algorithm SHA256).Hash
          $instSize = (Get-Item $dstInst).Length

          # 写入 meta 文件供后续 job 使用（裸 exe 与安装包各一份 hash/size）
          @{
            hash           = $exeHash;  size           = $exeSize;
            installer_hash = $instHash; installer_size = $instSize
          } | ConvertTo-Json | Out-File "$binDir/windows-meta.json" -Encoding utf8
          Write-Host "Windows exe:       $dstExe (size=$exeSize, sha256=$exeHash)"
          Write-Host "Windows installer: $dstInst (size=$instSize, sha256=$instHash)"

      # ── macOS: Ad-hoc 签名 + 打包 DMG ──
      - name: Codesign & Package DMG (macOS)
        if: matrix.os_name == 'macos'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ARCH="${{ matrix.arch }}"

          # Wails 用 wails.json 的 name 字段（冰茶AI）作为 .app 名，动态查找
          APP_PATH=$(find "${{ env.WAILS_DIR }}/build/bin" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::No .app bundle found in ${{ env.WAILS_DIR }}/build/bin/"
            ls -la "${{ env.WAILS_DIR }}/build/bin/" || true
            exit 1
          fi
          echo "Found .app bundle: $APP_PATH"

          # Ad-hoc 签名
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep "$APP_PATH" && echo "✅ Signature verified"

          # 打包 DMG
          DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          sync && sleep 2

          DMG_OUT="${{ env.WAILS_DIR }}/build/bin"
          DMG_FILE="${DMG_OUT}/${{ env.APP_NAME }}-${VERSION}-${ARCH}.dmg"

          for i in 1 2 3; do
            hdiutil create \
              -volname "${{ env.APP_NAME }}" \
              -srcfolder "$DMG_DIR" \
              -ov -format UDZO \
              "$DMG_FILE" && break
            echo "hdiutil attempt $i failed, retrying..."
            sleep 5
          done
          rm -rf "$DMG_DIR"

          # 计算 hash + size
          HASH=$(shasum -a 256 "$DMG_FILE" | cut -d' ' -f1 | tr '[:lower:]' '[:upper:]')
          SIZE=$(stat -f%z "$DMG_FILE")
          echo "{\"hash\":\"$HASH\",\"size\":$SIZE}" > "${DMG_OUT}/macos-${ARCH}-meta.json"
          echo "✅ DMG: $DMG_FILE (size=$SIZE, sha256=$HASH)"

      # ── Linux: 打包 tar.gz + 计算 hash ──
      - name: Package Linux artifact
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BIN_DIR="${{ env.WAILS_DIR }}/build/bin"
          # Wails 在 Linux 上输出的二进制名可能是中文名或 APP_NAME
          BIN_FILE=$(find "$BIN_DIR" -maxdepth 1 -type f -executable | head -1)
          if [ -z "$BIN_FILE" ]; then
            echo "::error::No executable found in $BIN_DIR"
            ls -la "$BIN_DIR" || true
            exit 1
          fi
          echo "Found binary: $BIN_FILE"

          # 重命名并打包
          DEST="${BIN_DIR}/${{ env.APP_NAME }}-${VERSION}-linux-amd64"
          cp "$BIN_FILE" "$DEST"
          chmod +x "$DEST"
          tar -czf "${DEST}.tar.gz" -C "$BIN_DIR" "$(basename $DEST)"

          # 计算 hash
          HASH=$(sha256sum "${DEST}.tar.gz" | cut -d' ' -f1 | tr '[:lower:]' '[:upper:]')
          SIZE=$(stat --printf="%s" "${DEST}.tar.gz")
          echo "{\"hash\":\"$HASH\",\"size\":$SIZE}" > "${BIN_DIR}/linux-amd64-meta.json"
          echo "✅ Linux: ${DEST}.tar.gz (size=$SIZE, sha256=$HASH)"

      # ── 上传构建产物 ──
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            ${{ env.WAILS_DIR }}/build/bin/${{ env.APP_NAME }}-*
            ${{ env.WAILS_DIR }}/build/bin/*-meta.json
            ${{ env.WAILS_DIR }}/build/bin/*.tar.gz

  # ──────────────── 阶段 2: 发布到公开 GitHub Release ────────────────
  # 二进制文件发布到公开仓库 bcai-releases，客户端直接从 GitHub CDN 下载。
  # 仅 latest-wails.json 提交到本仓库（供 bcai.lol / bcai.space 提供更新检查）。
  # 前提：
  #   1. 在 GitHub 创建公开仓库: bingcha-2/bcai-releases
  #   2. 创建 PAT (Fine-grained, contents:write 权限 on bcai-releases)
  #   3. 在本仓库 (bingcha-2/gfa) Settings → Secrets 设置 BCAIDOWNLOAD
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      RELEASE_REPO: bingcha-2/bcai-releases
      GH_DOWNLOAD_BASE: https://github.com/bingcha-2/bcai-releases/releases/download

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      # ── 读取各平台 meta (hash + size) ──
      - name: Read build metadata
        id: meta
        run: |
          read_meta() {
            local file=$(find artifacts -name "$1" | head -1)
            if [ -n "$file" ] && [ -f "$file" ]; then
              echo "hash=$(jq -r '.hash' "$file")"
              echo "size=$(jq -r '.size' "$file")"
            else
              echo "hash="
              echo "size=0"
            fi
          }

          {
            read_meta "windows-meta.json" | sed 's/^/win_/'
            read_meta "macos-arm64-meta.json" | sed 's/^/mac_arm_/'
            read_meta "macos-amd64-meta.json" | sed 's/^/mac_amd_/'
            read_meta "linux-amd64-meta.json" | sed 's/^/linux_/'
          } >> "$GITHUB_OUTPUT"

          # Windows NSIS 安装包的 hash/size（首次下载用）
          win_meta=$(find artifacts -name "windows-meta.json" | head -1)
          if [ -n "$win_meta" ] && [ -f "$win_meta" ]; then
            {
              echo "win_installer_hash=$(jq -r '.installer_hash // empty' "$win_meta")"
              echo "win_installer_size=$(jq -r '.installer_size // 0' "$win_meta")"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── 创建 GitHub Release（公开仓库，无需认证即可下载）──
      - name: Create GitHub Release on public repo
        env:
          GH_TOKEN: ${{ secrets.BCAIDOWNLOAD }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          TAG="wails-v${VERSION}"
          DL="${{ env.GH_DOWNLOAD_BASE }}/${TAG}"

          mapfile -t FILES < <(find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.tar.gz" \))

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No release assets found"
            exit 1
          fi

          gh release delete "$TAG" --repo "${{ env.RELEASE_REPO }}" --yes 2>/dev/null || true

          gh release create "$TAG" \
            "${FILES[@]}" \
            --repo "${{ env.RELEASE_REPO }}" \
            --title "冰茶AI v${VERSION}" \
            --notes "## 🍵 冰茶AI v${VERSION}

          ${CHANGELOG}

          ### 下载
          | 平台 | 架构 | 下载 |
          |------|------|------|
          | Windows | x64 | [${{ env.APP_NAME }}-${VERSION}-setup.exe（安装包，推荐）](${DL}/${{ env.APP_NAME }}-${VERSION}-setup.exe) |
          | Windows | x64 | [${{ env.APP_NAME }}-${VERSION}.exe（免安装裸 exe）](${DL}/${{ env.APP_NAME }}-${VERSION}.exe) |
          | macOS | Apple Silicon | [${{ env.APP_NAME }}-${VERSION}-arm64.dmg](${DL}/${{ env.APP_NAME }}-${VERSION}-arm64.dmg) |
          | macOS | Intel | [${{ env.APP_NAME }}-${VERSION}-amd64.dmg](${DL}/${{ env.APP_NAME }}-${VERSION}-amd64.dmg) |
          | Linux | x64 | [${{ env.APP_NAME }}-${VERSION}-linux-amd64.tar.gz](${DL}/${{ env.APP_NAME }}-${VERSION}-linux-amd64.tar.gz) |

          > 已安装用户会自动收到更新推送，无需手动下载。

          ### macOS 首次打开
          右键点击应用 → 打开 → 确认打开

          ### Windows
          推荐下载**安装包(setup.exe)**安装。若 SmartScreen 提示 → 更多信息 → 仍要运行。
          少数情况下 Defender 可能误报 \`Sabsik.FL.A!ml\`(未签名 Go 程序的常见 ML 误报)，可在 VirusTotal 自行核验后允许运行。" \
            --latest

          echo "✅ Release created: $TAG"

      # ── Defender 误报申诉助手 ──
      # 微软对个人/小团队没有免费的「误报上报 API」（只有企业版 Defender 租户才有），
      # 所以这里把「提交所需的一切」整理成可直接粘贴的块写进 Job Summary，
      # 发版后点开 Actions 运行页 → Summary，复制粘贴到门户即可，约 10 秒。
      - name: Defender false-positive submission helper
        if: always()
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="wails-v${VERSION}"
          DL="${{ env.GH_DOWNLOAD_BASE }}/${TAG}"
          SETUP_URL="${DL}/${{ env.APP_NAME }}-${VERSION}-setup.exe"
          EXE_URL="${DL}/${{ env.APP_NAME }}-${VERSION}.exe"
          SETUP_SHA="${{ steps.meta.outputs.win_installer_hash }}"
          EXE_SHA="${{ steps.meta.outputs.win_hash }}"

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🛡️ Defender 误报申诉（每版手动一次，约 10 秒）

          门户：<https://www.microsoft.com/en-us/wdsi/filesubmission>
          → 选 **Software developer** → **Incorrectly detected as malware/malicious**

          **待提交文件 URL（任选其一或都提交）**
          | 文件 | URL | SHA256 |
          |------|-----|--------|
          | 安装包 | $SETUP_URL | \`$SETUP_SHA\` |
          | 裸 exe | $EXE_URL | \`$EXE_SHA\` |

          **粘贴到 "Additional information" 的说明文案：**

          \`\`\`
          BingchaAI (冰茶AI) v${VERSION} is a legitimate desktop application built with the
          Wails framework (Go + WebView2). Windows Defender flags it as
          Trojan:Win32/Sabsik.FL.A!ml, which is a machine-learning false positive that
          commonly affects unsigned Go binaries. The application is built transparently and
          reproducibly via a public GitHub Actions workflow (build-wails.yml). It is not
          malware and performs no malicious behavior. Please re-evaluate and clear the
          detection. SHA256 (installer): $SETUP_SHA ; SHA256 (exe): $EXE_SHA
          \`\`\`
          EOF
          echo "Submission helper written to job summary."

      # ── 生成 latest-wails.json 并提交（仅此文件，不含二进制）──
      - name: Generate and commit update manifest
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          TAG="wails-v${VERSION}"
          DL="${{ env.GH_DOWNLOAD_BASE }}/${TAG}"
          UPDATES="${{ env.UPDATES_DIR }}"

          mkdir -p "$UPDATES"

          export VERSION CHANGELOG DL UPDATES
          export WIN_HASH="${{ steps.meta.outputs.win_hash }}"
          export WIN_SIZE="${{ steps.meta.outputs.win_size }}"
          export WIN_INSTALLER_HASH="${{ steps.meta.outputs.win_installer_hash }}"
          export WIN_INSTALLER_SIZE="${{ steps.meta.outputs.win_installer_size }}"
          export MAC_ARM_HASH="${{ steps.meta.outputs.mac_arm_hash }}"
          export MAC_ARM_SIZE="${{ steps.meta.outputs.mac_arm_size }}"
          export MAC_AMD_HASH="${{ steps.meta.outputs.mac_amd_hash }}"
          export MAC_AMD_SIZE="${{ steps.meta.outputs.mac_amd_size }}"
          export LINUX_HASH="${{ steps.meta.outputs.linux_hash }}"
          export LINUX_SIZE="${{ steps.meta.outputs.linux_size }}"

          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const env = process.env;
          const size = (name) => {
            const value = Number(env[name]);
            if (!Number.isFinite(value)) throw new Error(`Invalid ${name}: ${env[name]}`);
            return value;
          };

          const manifest = {
            version: env.VERSION,
            url: `${env.DL}/${env.APP_NAME}-${env.VERSION}.exe`,
            sha256: env.WIN_HASH,
            size: size("WIN_SIZE"),
            installerUrl: `${env.DL}/${env.APP_NAME}-${env.VERSION}-setup.exe`,
            installerSha256: env.WIN_INSTALLER_HASH,
            installerSize: size("WIN_INSTALLER_SIZE"),
            changelog: env.CHANGELOG || "",
            minVersion: env.VERSION,
            macOS: {
              arm64: {
                url: `${env.DL}/${env.APP_NAME}-${env.VERSION}-arm64.dmg`,
                sha256: env.MAC_ARM_HASH,
                size: size("MAC_ARM_SIZE"),
              },
              amd64: {
                url: `${env.DL}/${env.APP_NAME}-${env.VERSION}-amd64.dmg`,
                sha256: env.MAC_AMD_HASH,
                size: size("MAC_AMD_SIZE"),
              },
            },
            linux: {
              amd64: {
                url: `${env.DL}/${env.APP_NAME}-${env.VERSION}-linux-amd64.tar.gz`,
                sha256: env.LINUX_HASH,
                size: size("LINUX_SIZE"),
              },
            },
          };

          fs.writeFileSync(
            path.join(env.UPDATES, "latest-wails.json"),
            `${JSON.stringify(manifest, null, 2)}\n`,
          );
          NODE

          echo "✅ latest-wails.json generated:"
          cat "${UPDATES}/latest-wails.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${UPDATES}/latest-wails.json"
          git commit -m "release: update manifest for v${VERSION}

          Download URLs now point to GitHub Release (public repo).
          Binaries no longer committed to git." || echo "No changes to commit"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}

