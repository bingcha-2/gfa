name: Build & Release BingchaAI (Wails)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 4.3.0)'
        required: true
        default: '4.3.0'
      changelog:
        description: '更新日志 (简短描述本次更新)'
        required: false
        default: '性能优化和问题修复'

permissions:
  contents: write

env:
  APP_NAME: BingchaAI
  WAILS_DIR: apps/bcai-wails
  UPDATES_DIR: apps/web/public/updates

jobs:
  # ──────────────── 阶段 1: 多平台构建 ────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: windows-latest
            os_name: windows
            arch: amd64
            goos: windows
            goarch: amd64
            suffix: .exe
          # macOS Apple Silicon (M1/M2/M3/M4)
          - platform: macos-latest
            os_name: macos
            arch: arm64
            goos: darwin
            goarch: arm64
            suffix: ''
          # Linux x64
          - platform: ubuntu-latest
            os_name: linux
            arch: amd64
            goos: linux
            goarch: amd64
            suffix: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: ${{ env.WAILS_DIR }}/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev || sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app
        working-directory: ${{ env.WAILS_DIR }}
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          wails build -ldflags "-X main.AppVersion=${VERSION}"

      # ── Windows: 重命名 + 计算 hash ──
      - name: Prepare Windows artifact
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $src = "${{ env.WAILS_DIR }}/build/bin/${{ env.APP_NAME }}.exe"
          $dst = "${{ env.WAILS_DIR }}/build/bin/${{ env.APP_NAME }}-${version}.exe"
          Copy-Item $src $dst
          $hash = (Get-FileHash $dst -Algorithm SHA256).Hash
          $size = (Get-Item $dst).Length
          # 写入 meta 文件供后续 job 使用
          @{ hash = $hash; size = $size } | ConvertTo-Json | Out-File "${{ env.WAILS_DIR }}/build/bin/windows-meta.json" -Encoding utf8
          Write-Host "Windows exe: $dst (size=$size, sha256=$hash)"

      # ── macOS: Ad-hoc 签名 + 打包 DMG ──
      - name: Codesign & Package DMG (macOS)
        if: matrix.os_name == 'macos'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ARCH="${{ matrix.arch }}"

          # Wails 用 wails.json 的 name 字段（冰茶AI）作为 .app 名，动态查找
          APP_PATH=$(find "${{ env.WAILS_DIR }}/build/bin" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::No .app bundle found in ${{ env.WAILS_DIR }}/build/bin/"
            ls -la "${{ env.WAILS_DIR }}/build/bin/" || true
            exit 1
          fi
          echo "Found .app bundle: $APP_PATH"

          # Ad-hoc 签名
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep "$APP_PATH" && echo "✅ Signature verified"

          # 打包 DMG
          DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          sync && sleep 2

          DMG_OUT="${{ env.WAILS_DIR }}/build/bin"
          DMG_FILE="${DMG_OUT}/${{ env.APP_NAME }}-${VERSION}-${ARCH}.dmg"

          for i in 1 2 3; do
            hdiutil create \
              -volname "${{ env.APP_NAME }}" \
              -srcfolder "$DMG_DIR" \
              -ov -format UDZO \
              "$DMG_FILE" && break
            echo "hdiutil attempt $i failed, retrying..."
            sleep 5
          done
          rm -rf "$DMG_DIR"

          # 计算 hash + size
          HASH=$(shasum -a 256 "$DMG_FILE" | cut -d' ' -f1 | tr '[:lower:]' '[:upper:]')
          SIZE=$(stat -f%z "$DMG_FILE")
          echo "{\"hash\":\"$HASH\",\"size\":$SIZE}" > "${DMG_OUT}/macos-${ARCH}-meta.json"
          echo "✅ DMG: $DMG_FILE (size=$SIZE, sha256=$HASH)"

      # ── Linux: 打包 tar.gz + 计算 hash ──
      - name: Package Linux artifact
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BIN_DIR="${{ env.WAILS_DIR }}/build/bin"
          # Wails 在 Linux 上输出的二进制名可能是中文名或 APP_NAME
          BIN_FILE=$(find "$BIN_DIR" -maxdepth 1 -type f -executable | head -1)
          if [ -z "$BIN_FILE" ]; then
            echo "::error::No executable found in $BIN_DIR"
            ls -la "$BIN_DIR" || true
            exit 1
          fi
          echo "Found binary: $BIN_FILE"

          # 重命名并打包
          DEST="${BIN_DIR}/${{ env.APP_NAME }}-${VERSION}-linux-amd64"
          cp "$BIN_FILE" "$DEST"
          chmod +x "$DEST"
          tar -czf "${DEST}.tar.gz" -C "$BIN_DIR" "$(basename $DEST)"

          # 计算 hash
          HASH=$(sha256sum "${DEST}.tar.gz" | cut -d' ' -f1 | tr '[:lower:]' '[:upper:]')
          SIZE=$(stat --printf="%s" "${DEST}.tar.gz")
          echo "{\"hash\":\"$HASH\",\"size\":$SIZE}" > "${BIN_DIR}/linux-amd64-meta.json"
          echo "✅ Linux: ${DEST}.tar.gz (size=$SIZE, sha256=$HASH)"

      # ── 上传构建产物 ──
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            ${{ env.WAILS_DIR }}/build/bin/${{ env.APP_NAME }}-*
            ${{ env.WAILS_DIR }}/build/bin/*-meta.json
            ${{ env.WAILS_DIR }}/build/bin/*.tar.gz

  # ──────────────── 阶段 2: 发布到 bcai.site + GitHub Release ────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      # ── 复制构建产物到 web/public/updates/ ──
      - name: Deploy to bcai.site updates directory
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          UPDATES="${{ env.UPDATES_DIR }}"

          mkdir -p "$UPDATES"

          # 复制 Windows exe
          WIN_EXE=$(find artifacts -name "*.exe" | head -1)
          if [ -n "$WIN_EXE" ]; then
            cp "$WIN_EXE" "${UPDATES}/${{ env.APP_NAME }}-${VERSION}.exe"
            echo "✅ Copied Windows exe"
          fi

          # 复制 macOS DMG (arm64 + amd64)
          for dmg in $(find artifacts -name "*.dmg"); do
            BASENAME=$(basename "$dmg")
            cp "$dmg" "${UPDATES}/${BASENAME}"
            echo "✅ Copied $BASENAME"
          done

          # 复制 Linux tar.gz
          LINUX_TAR=$(find artifacts -name "*.tar.gz" | head -1)
          if [ -n "$LINUX_TAR" ]; then
            cp "$LINUX_TAR" "${UPDATES}/${{ env.APP_NAME }}-${VERSION}-linux-amd64.tar.gz"
            echo "✅ Copied Linux tar.gz"
          fi

          # 读取 Windows meta
          WIN_META=$(find artifacts -name "windows-meta.json" | head -1)
          WIN_HASH=""
          WIN_SIZE=0
          if [ -n "$WIN_META" ] && [ -f "$WIN_META" ]; then
            WIN_HASH=$(jq -r '.hash' "$WIN_META")
            WIN_SIZE=$(jq -r '.size' "$WIN_META")
          fi

          # 读取 macOS arm64 meta
          MAC_ARM_META=$(find artifacts -name "macos-arm64-meta.json" | head -1)
          MAC_ARM_HASH=""
          MAC_ARM_SIZE=0
          if [ -n "$MAC_ARM_META" ] && [ -f "$MAC_ARM_META" ]; then
            MAC_ARM_HASH=$(jq -r '.hash' "$MAC_ARM_META")
            MAC_ARM_SIZE=$(jq -r '.size' "$MAC_ARM_META")
          fi

          # 读取 Linux amd64 meta
          LINUX_META=$(find artifacts -name "linux-amd64-meta.json" | head -1)
          LINUX_HASH=""
          LINUX_SIZE=0
          if [ -n "$LINUX_META" ] && [ -f "$LINUX_META" ]; then
            LINUX_HASH=$(jq -r '.hash' "$LINUX_META")
            LINUX_SIZE=$(jq -r '.size' "$LINUX_META")
          fi



          # 生成 latest-wails.json (客户端自动更新用)
          cat > "${UPDATES}/latest-wails.json" << EOF
          {
            "version": "${VERSION}",
            "url": "https://bcai.site/updates/${{ env.APP_NAME }}-${VERSION}.exe",
            "sha256": "${WIN_HASH}",
            "size": ${WIN_SIZE},
            "changelog": "${CHANGELOG}",
            "minVersion": "4.0.0",
            "macOS": {
              "arm64": {
                "url": "https://bcai.site/updates/${{ env.APP_NAME }}-${VERSION}-arm64.dmg",
                "sha256": "${MAC_ARM_HASH}",
                "size": ${MAC_ARM_SIZE}
              }
            },
            "linux": {
              "amd64": {
                "url": "https://bcai.site/updates/${{ env.APP_NAME }}-${VERSION}-linux-amd64.tar.gz",
                "sha256": "${LINUX_HASH}",
                "size": ${LINUX_SIZE}
              }
            }
          }
          EOF

          echo "✅ latest-wails.json updated"
          cat "${UPDATES}/latest-wails.json"

          # 列出最终 updates 目录
          echo "=== Final updates directory ==="
          ls -lh "$UPDATES"

      # ── 提交到 Git (触发 web 部署) ──
      - name: Commit and push updates
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.UPDATES_DIR }}/"
          git commit -m "release: BingchaAI v${VERSION} — auto-publish build artifacts

          Windows exe + macOS DMG (arm64/amd64) built by CI
          Files deployed to web/public/updates/" || echo "No changes to commit"
          git push origin main

      # ── 同时创建 GitHub Release (备份下载) ──
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          TAG="wails-v${VERSION}"

          mapfile -t FILES < <(find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.tar.gz" \))

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::warning::No release assets found, skipping GitHub Release"
            exit 0
          fi

          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" \
            "${FILES[@]}" \
            --title "冰茶AI v${VERSION}" \
            --notes "## 🍵 冰茶AI v${VERSION}

          ${CHANGELOG}

          ### 下载
          | 平台 | 架构 | 下载 |
          |------|------|------|
          | Windows | x64 | [bcai.site 下载](https://bcai.site/updates/${{ env.APP_NAME }}-${VERSION}.exe) |
          | macOS | Apple Silicon (M1/M2/M3) | [bcai.site 下载](https://bcai.site/updates/${{ env.APP_NAME }}-${VERSION}-arm64.dmg) |
          | Linux | x64 | [bcai.site 下载](https://bcai.site/updates/${{ env.APP_NAME }}-${VERSION}-linux-amd64.tar.gz) |

          > 已安装用户会自动收到更新推送，无需手动下载。

          ### macOS 首次打开
          右键点击应用 → 打开 → 确认打开

          ### Windows
          如 SmartScreen 警告 → 更多信息 → 仍要运行" \
            --latest
