name: Build & Release BingchaAI (Wails)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 5.2.1)'
        required: true
        default: '5.2.1'
      changelog:
        description: '更新日志 (简短描述本次更新)'
        required: false
        default: '性能优化和问题修复'

permissions:
  contents: write

env:
  APP_NAME: BingchaAI
  WAILS_DIR: apps/bcai-wails
  UPDATES_DIR: apps/web/public/updates

jobs:
  # ──────────────── 阶段 1: 多平台构建 ────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: windows-latest
            os_name: windows
            arch: amd64
            goos: windows
            goarch: amd64
            suffix: .exe
          # macOS Apple Silicon (M1/M2/M3/M4)
          - platform: macos-latest
            os_name: macos
            arch: arm64
            goos: darwin
            goarch: arm64
            suffix: ''
          # macOS Intel (x64) — macos-13 retired Dec 2025, use macos-15-intel
          - platform: macos-15-intel
            os_name: macos
            arch: amd64
            goos: darwin
            goarch: amd64
            suffix: ''
          # Linux x64 (ubuntu-22.04 因为 Wails v2 依赖 webkit2gtk-4.0，24.04 已移除)
          - platform: ubuntu-22.04
            os_name: linux
            arch: amd64
            goos: linux
            goarch: amd64
            suffix: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: ${{ env.WAILS_DIR }}/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app
        working-directory: ${{ env.WAILS_DIR }}
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          wails build -ldflags "-X main.AppVersion=${VERSION}"

      # ── Windows: 重命名 + 计算 hash ──
      - name: Prepare Windows artifact
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $src = "${{ env.WAILS_DIR }}/build/bin/${{ env.APP_NAME }}.exe"
          $dst = "${{ env.WAILS_DIR }}/build/bin/${{ env.APP_NAME }}-${version}.exe"
          Copy-Item $src $dst
          $hash = (Get-FileHash $dst -Algorithm SHA256).Hash
          $size = (Get-Item $dst).Length
          # 写入 meta 文件供后续 job 使用
          @{ hash = $hash; size = $size } | ConvertTo-Json | Out-File "${{ env.WAILS_DIR }}/build/bin/windows-meta.json" -Encoding utf8
          Write-Host "Windows exe: $dst (size=$size, sha256=$hash)"

      # ── macOS: Ad-hoc 签名 + 打包 DMG ──
      - name: Codesign & Package DMG (macOS)
        if: matrix.os_name == 'macos'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ARCH="${{ matrix.arch }}"

          # Wails 用 wails.json 的 name 字段（冰茶AI）作为 .app 名，动态查找
          APP_PATH=$(find "${{ env.WAILS_DIR }}/build/bin" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::No .app bundle found in ${{ env.WAILS_DIR }}/build/bin/"
            ls -la "${{ env.WAILS_DIR }}/build/bin/" || true
            exit 1
          fi
          echo "Found .app bundle: $APP_PATH"

          # Ad-hoc 签名
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep "$APP_PATH" && echo "✅ Signature verified"

          # 打包 DMG
          DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          sync && sleep 2

          DMG_OUT="${{ env.WAILS_DIR }}/build/bin"
          DMG_FILE="${DMG_OUT}/${{ env.APP_NAME }}-${VERSION}-${ARCH}.dmg"

          for i in 1 2 3; do
            hdiutil create \
              -volname "${{ env.APP_NAME }}" \
              -srcfolder "$DMG_DIR" \
              -ov -format UDZO \
              "$DMG_FILE" && break
            echo "hdiutil attempt $i failed, retrying..."
            sleep 5
          done
          rm -rf "$DMG_DIR"

          # 计算 hash + size
          HASH=$(shasum -a 256 "$DMG_FILE" | cut -d' ' -f1 | tr '[:lower:]' '[:upper:]')
          SIZE=$(stat -f%z "$DMG_FILE")
          echo "{\"hash\":\"$HASH\",\"size\":$SIZE}" > "${DMG_OUT}/macos-${ARCH}-meta.json"
          echo "✅ DMG: $DMG_FILE (size=$SIZE, sha256=$HASH)"

      # ── Linux: 打包 tar.gz + 计算 hash ──
      - name: Package Linux artifact
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BIN_DIR="${{ env.WAILS_DIR }}/build/bin"
          # Wails 在 Linux 上输出的二进制名可能是中文名或 APP_NAME
          BIN_FILE=$(find "$BIN_DIR" -maxdepth 1 -type f -executable | head -1)
          if [ -z "$BIN_FILE" ]; then
            echo "::error::No executable found in $BIN_DIR"
            ls -la "$BIN_DIR" || true
            exit 1
          fi
          echo "Found binary: $BIN_FILE"

          # 重命名并打包
          DEST="${BIN_DIR}/${{ env.APP_NAME }}-${VERSION}-linux-amd64"
          cp "$BIN_FILE" "$DEST"
          chmod +x "$DEST"
          tar -czf "${DEST}.tar.gz" -C "$BIN_DIR" "$(basename $DEST)"

          # 计算 hash
          HASH=$(sha256sum "${DEST}.tar.gz" | cut -d' ' -f1 | tr '[:lower:]' '[:upper:]')
          SIZE=$(stat --printf="%s" "${DEST}.tar.gz")
          echo "{\"hash\":\"$HASH\",\"size\":$SIZE}" > "${BIN_DIR}/linux-amd64-meta.json"
          echo "✅ Linux: ${DEST}.tar.gz (size=$SIZE, sha256=$HASH)"

      # ── 上传构建产物 ──
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            ${{ env.WAILS_DIR }}/build/bin/${{ env.APP_NAME }}-*
            ${{ env.WAILS_DIR }}/build/bin/*-meta.json
            ${{ env.WAILS_DIR }}/build/bin/*.tar.gz

  # ──────────────── 阶段 2: 发布到公开 GitHub Release ────────────────
  # 二进制文件发布到公开仓库 bcai-releases，客户端直接从 GitHub CDN 下载。
  # 仅 latest-wails.json 提交到本仓库（供 bcai.lol / bcai.space 提供更新检查）。
  # 前提：
  #   1. 在 GitHub 创建公开仓库: bingcha135-sys/bcai-releases
  #   2. 创建 PAT (Fine-grained, contents:write 权限 on bcai-releases)
  #   3. 在本仓库 Settings → Secrets 添加 RELEASE_PAT
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      RELEASE_REPO: bingcha135-sys/bcai-releases
      GH_DOWNLOAD_BASE: https://github.com/bingcha135-sys/bcai-releases/releases/download

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      # ── 读取各平台 meta (hash + size) ──
      - name: Read build metadata
        id: meta
        run: |
          read_meta() {
            local file=$(find artifacts -name "$1" | head -1)
            if [ -n "$file" ] && [ -f "$file" ]; then
              echo "hash=$(jq -r '.hash' "$file")"
              echo "size=$(jq -r '.size' "$file")"
            else
              echo "hash="
              echo "size=0"
            fi
          }

          {
            echo "# Windows"
            read_meta "windows-meta.json" | sed 's/^/win_/'
            echo "# macOS arm64"
            read_meta "macos-arm64-meta.json" | sed 's/^/mac_arm_/'
            echo "# macOS amd64"
            read_meta "macos-amd64-meta.json" | sed 's/^/mac_amd_/'
            echo "# Linux amd64"
            read_meta "linux-amd64-meta.json" | sed 's/^/linux_/'
          } >> "$GITHUB_OUTPUT"

      # ── 创建 GitHub Release（公开仓库，无需认证即可下载）──
      - name: Create GitHub Release on public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          TAG="wails-v${VERSION}"
          DL="${{ env.GH_DOWNLOAD_BASE }}/${TAG}"

          mapfile -t FILES < <(find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.tar.gz" \))

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No release assets found"
            exit 1
          fi

          gh release delete "$TAG" --repo "${{ env.RELEASE_REPO }}" --yes 2>/dev/null || true

          gh release create "$TAG" \
            "${FILES[@]}" \
            --repo "${{ env.RELEASE_REPO }}" \
            --title "冰茶AI v${VERSION}" \
            --notes "## 🍵 冰茶AI v${VERSION}

          ${CHANGELOG}

          ### 下载
          | 平台 | 架构 | 下载 |
          |------|------|------|
          | Windows | x64 | [${{ env.APP_NAME }}-${VERSION}.exe](${DL}/${{ env.APP_NAME }}-${VERSION}.exe) |
          | macOS | Apple Silicon | [${{ env.APP_NAME }}-${VERSION}-arm64.dmg](${DL}/${{ env.APP_NAME }}-${VERSION}-arm64.dmg) |
          | macOS | Intel | [${{ env.APP_NAME }}-${VERSION}-amd64.dmg](${DL}/${{ env.APP_NAME }}-${VERSION}-amd64.dmg) |
          | Linux | x64 | [${{ env.APP_NAME }}-${VERSION}-linux-amd64.tar.gz](${DL}/${{ env.APP_NAME }}-${VERSION}-linux-amd64.tar.gz) |

          > 已安装用户会自动收到更新推送，无需手动下载。

          ### macOS 首次打开
          右键点击应用 → 打开 → 确认打开

          ### Windows
          如 SmartScreen 警告 → 更多信息 → 仍要运行" \
            --latest

          echo "✅ Release created: $TAG"

      # ── 生成 latest-wails.json 并提交（仅此文件，不含二进制）──
      - name: Generate and commit update manifest
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          TAG="wails-v${VERSION}"
          DL="${{ env.GH_DOWNLOAD_BASE }}/${TAG}"
          UPDATES="${{ env.UPDATES_DIR }}"

          mkdir -p "$UPDATES"

          cat > "${UPDATES}/latest-wails.json" << EOF
          {
            "version": "${VERSION}",
            "url": "${DL}/${{ env.APP_NAME }}-${VERSION}.exe",
            "sha256": "${{ steps.meta.outputs.win_hash }}",
            "size": ${{ steps.meta.outputs.win_size }},
            "changelog": "${CHANGELOG}",
            "minVersion": "${VERSION}",
            "macOS": {
              "arm64": {
                "url": "${DL}/${{ env.APP_NAME }}-${VERSION}-arm64.dmg",
                "sha256": "${{ steps.meta.outputs.mac_arm_hash }}",
                "size": ${{ steps.meta.outputs.mac_arm_size }}
              },
              "amd64": {
                "url": "${DL}/${{ env.APP_NAME }}-${VERSION}-amd64.dmg",
                "sha256": "${{ steps.meta.outputs.mac_amd_hash }}",
                "size": ${{ steps.meta.outputs.mac_amd_size }}
              }
            },
            "linux": {
              "amd64": {
                "url": "${DL}/${{ env.APP_NAME }}-${VERSION}-linux-amd64.tar.gz",
                "sha256": "${{ steps.meta.outputs.linux_hash }}",
                "size": ${{ steps.meta.outputs.linux_size }}
              }
            }
          }
          EOF

          echo "✅ latest-wails.json generated:"
          cat "${UPDATES}/latest-wails.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${UPDATES}/latest-wails.json"
          git commit -m "release: update manifest for v${VERSION}

          Download URLs now point to GitHub Release (public repo).
          Binaries no longer committed to git." || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

